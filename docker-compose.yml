# version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: servicedesk_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-servicedesk}
      MYSQL_USER: ${MYSQL_USER:-sduser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: >
      --max-allowed-packet=26214400
      --innodb-buffer-pool-size=268435456
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    # ports НЕ пробрасываются наружу: MySQL доступен только внутри Docker-сети
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: servicedesk_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # ports НЕ пробрасываются наружу: Redis доступен только внутри Docker-сети
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: servicedesk_api
    restart: unless-stopped
    env_file: ./backend/.env
    # port 8000 НЕ пробрасывается наружу: API доступен через Nginx
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # volumes с исходным кодом НЕ монтируются в продакшене
    # код уже запечён в образ через Dockerfile

  celery_worker:
    build: ./backend
    container_name: servicedesk_celery
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file: ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # volumes с исходным кодом НЕ монтируются в продакшене

  celery_beat:
    build: ./backend
    container_name: servicedesk_beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    env_file: ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # volumes с исходным кодом НЕ монтируются в продакшене

  frontend:
    build: ./frontend
    container_name: servicedesk_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/ssl/servicedesk:ro   # сертификаты Let's Encrypt
    depends_on:
      - backend

volumes:
  mysql_data:
