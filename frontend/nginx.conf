server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip-сжатие для JS/CSS/JSON
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # React SPA — все неизвестные пути отдают index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API-запросов к FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймаут увеличен для BLOB-стриминга файлов (ADR-001)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Отключить буферизацию для streaming-ответов (файлы)
        proxy_buffering off;
    }

    # Health check (используется Docker healthcheck)
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Кеширование статических ассетов Vite (хеш в имени файла)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
