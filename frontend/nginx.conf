# nginx.conf — ЛОКАЛЬНАЯ РАЗРАБОТКА (HTTP only)
# Для продакшена используй nginx.prod.conf

limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip-сжатие для JS/CSS/JSON
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # React SPA — все неизвестные пути отдают index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Rate limiting на endpoint логина (5 попыток/мин с burst=3)
    location /api/v1/auth/login {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        client_max_body_size 1m;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Проксирование API-запросов к FastAPI backend
    location /api/ {
        client_max_body_size 20m;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймаут увеличен для BLOB-стриминга файлов (ADR-001)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Отключить буферизацию для streaming-ответов (файлы)
        proxy_buffering off;
    }

    # Health check (используется Docker healthcheck)
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Кеширование статических ассетов Vite (хеш в имени файла)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
