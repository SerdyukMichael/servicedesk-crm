name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v || true

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: |
          docker build -t servicedesk-crm-backend:latest ./backend
      - name: Save and compress backend image
        run: |
          docker save servicedesk-crm-backend:latest | gzip > /tmp/backend.tar.gz
          ls -lh /tmp/backend.tar.gz
      - name: Upload backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend.tar.gz
          retention-days: 1

  deploy:
    needs: [test, build-frontend, build-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
      - name: Download backend image
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp/
      - name: Copy frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "frontend/dist/"
          target: "/var/www/servicedesk/"
          strip_components: 2
      - name: Copy backend image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "/tmp/backend.tar.gz"
          target: "/tmp/"
          strip_components: 0
      - name: Update frontend in container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 3m
          script: |
            docker cp /var/www/servicedesk/. servicedesk_web:/usr/share/nginx/html/
            docker exec servicedesk_web nginx -s reload
            echo "Frontend updated"
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            # Загружаем готовый образ (никакого docker build на сервере!)
            gzip -dc /tmp/backend.tar.gz | docker load
            rm -f /tmp/backend.tar.gz

            cd /opt/servicedesk-crm
            git config --global --add safe.directory /opt/servicedesk-crm
            git fetch origin main
            git reset --hard origin/main

            # Поднимаем все сервисы (на случай если что-то упало после ребута)
            docker compose up -d

            # Перезапускаем только backend с новым образом
            docker compose stop backend
            docker compose rm -f backend
            docker compose up -d --no-deps backend

            # Ждём healthy бэкенда (до 90 сек)
            for i in $(seq 1 18); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' servicedesk_api 2>/dev/null || echo "starting")
              echo "Health: $STATUS ($i/18)"
              [ "$STATUS" = "healthy" ] && break
              sleep 5
            done

            docker compose exec -T backend alembic upgrade head
            echo "Deploy complete"
