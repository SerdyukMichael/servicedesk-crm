[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    unit: Pure unit tests (no DB, no HTTP)
    integration: Integration tests (SQLite in-memory + TestClient)
    security: Authentication and authorisation tests
    rbac: Role-based access control tests
    br: Business rule tests
    neg: Negative test cases (expected errors)
    slow: Tests taking > 1 second

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# Environment variables for tests
env =
    DATABASE_URL=sqlite:///:memory:
    SECRET_KEY=test-secret-key
    ALGORITHM=HS256
    ACCESS_TOKEN_EXPIRE_MINUTES=60
