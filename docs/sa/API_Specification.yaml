openapi: 3.0.3
info:
  title: ServiceDesk CRM API
  description: |
    REST API для системы автоматизации сервисной компании по обслуживанию банкоматов и платёжного оборудования.

    ## Аутентификация
    Все защищённые эндпоинты требуют заголовок `Authorization: Bearer <token>`.
    Токен получается через `POST /auth/login`. Срок действия — 480 минут (8 часов).

    ## Формат ошибок
    ```json
    { "error": "ERROR_CODE", "message": "Описание ошибки", "details": {} }
    ```

    ## Пагинация
    Поддерживается параметрами `?page=1&size=20`.
    Ответ всегда включает `total`, `page`, `size`, `pages`.
  version: "2.0.0"
  contact:
    name: Solution Architect

servers:
  - url: http://localhost:8000/api/v1
    description: Local development
  - url: http://localhost/api/v1
    description: Docker Compose (via Nginx)

tags:
  - name: Auth
    description: Аутентификация и авторизация
  - name: Пользователи
    description: Управление пользователями (Module 8)
  - name: Клиенты
    description: CRM — клиентская база и контакты
  - name: Оборудование
    description: Парк оборудования (Module 10)
  - name: Заявки
    description: Заявки на обслуживание (Module 9)
  - name: Шаблоны работ
    description: Шаблоны типовых работ (UC-911)
  - name: Прайс-листы
    description: |
      Справочник услуг (`service_catalog`) и управление ценами каталога матценностей (`spare_parts`).
      История цен покрывает оба справочника через `price_history` (`entity_type`: `service` / `spare_part`).
      UC-101, UC-102, BR-F-110, BR-F-121, BR-F-122.
      Новые эндпоинты: `GET /spare-parts?has_price=true` — фильтр для форм актов/счетов;
      `GET /spare-parts/{id}/price-history` — история цен позиции;
      `GET /service-catalog/{id}/price-history` — история цен услуги.
  - name: Настройки
    description: Системные настройки — курсы валют (BR-F-102)
  - name: Запчасти
    description: Склад запчастей
  - name: Вендоры
    description: Поставщики запчастей и оборудования
  - name: Счета
    description: Счета и финансовые документы
  - name: Файлы
    description: Загрузка и выдача файлов (BLOB, ADR-001)
  - name: Уведомления
    description: In-app уведомления и настройки (Module 14)
  - name: Отчёты
    description: Аналитика и экспорт (Module 9/10)
  - name: Аудит
    description: Журнал изменений (admin/director)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ─── Общие ───────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: TICKET_NOT_FOUND
        message:
          type: string
          example: "Заявка #42 не найдена"
        details:
          type: object
      required: [error, message, details]

    PaginatedMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
          description: Текущая страница (начиная с 1)
        size:
          type: integer
          description: Размер страницы
        pages:
          type: integer
          description: Общее количество страниц
      required: [total, page, size, pages]

    # ─── Auth ─────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
      required: [access_token, token_type]

    # ─── User ─────────────────────────────────────────────────────────────────
    UserRole:
      type: string
      enum: [admin, sales_mgr, svc_mgr, engineer, manager, warehouse, accountant, director]

    UserResponse:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        full_name:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
          description: Массив ролей пользователя (union прав)
        phone:
          type: string
          nullable: true
        telegram_chat_id:
          type: string
          nullable: true
        is_active:
          type: boolean
        is_deleted:
          type: boolean
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, email, full_name, roles, is_active, is_deleted, created_at, updated_at]

    UserCreate:
      type: object
      properties:
        email:
          type: string
          format: email
        full_name:
          type: string
          maxLength: 200
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
          default: ["engineer"]
        password:
          type: string
          minLength: 8
        phone:
          type: string
          nullable: true
        telegram_chat_id:
          type: string
          nullable: true
      required: [email, full_name, password]

    UserUpdate:
      type: object
      properties:
        full_name:
          type: string
          maxLength: 200
        phone:
          type: string
          nullable: true
        telegram_chat_id:
          type: string
          nullable: true
        is_active:
          type: boolean
        new_password:
          type: string
          minLength: 8
          nullable: true

    # ─── Client ───────────────────────────────────────────────────────────────
    ClientResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        inn:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        assigned_manager_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, name, created_at]

    ClientCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 300
        inn:
          type: string
          maxLength: 12
          nullable: true
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        assigned_manager_id:
          type: integer
          nullable: true
      required: [name]

    ClientContactResponse:
      type: object
      properties:
        id:
          type: integer
        client_id:
          type: integer
        full_name:
          type: string
        position:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        is_primary:
          type: boolean
      required: [id, client_id, full_name, is_primary]

    # ─── Equipment ────────────────────────────────────────────────────────────
    WarrantyStatus:
      type: string
      enum: [valid, expiring_soon, expired]

    EquipmentResponse:
      type: object
      properties:
        id:
          type: integer
        serial_number:
          type: string
        client_id:
          type: integer
        model_id:
          type: integer
        model_name:
          type: string
        location:
          type: string
          nullable: true
        install_date:
          type: string
          format: date
          nullable: true
        warranty_expiry:
          type: string
          format: date
          nullable: true
        warranty_status:
          $ref: '#/components/schemas/WarrantyStatus'
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, serial_number, client_id, model_id, model_name, warranty_status, created_at]

    EquipmentCreate:
      type: object
      properties:
        serial_number:
          type: string
          maxLength: 100
        client_id:
          type: integer
        model_id:
          type: integer
        location:
          type: string
          nullable: true
        install_date:
          type: string
          format: date
          nullable: true
        warranty_expiry:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true
      required: [serial_number, client_id, model_id]

    EquipmentModelResponse:
      type: object
      properties:
        id:
          type: integer
        vendor:
          type: string
        model_name:
          type: string
        equipment_type:
          type: string
      required: [id, vendor, model_name, equipment_type]

    # ─── Ticket ───────────────────────────────────────────────────────────────
    TicketStatus:
      type: string
      enum: [new, assigned, in_progress, waiting_part, on_review, completed, closed, cancelled]

    TicketPriority:
      type: string
      enum: [critical, high, medium, low]

    TicketType:
      type: string
      enum: [repair, maintenance, diagnostics, installation]

    TicketResponse:
      type: object
      properties:
        id:
          type: integer
        number:
          type: string
          example: "T-20260328-0001"
          description: "Формат: T-YYYYMMDD-XXXX"
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/TicketStatus'
        priority:
          $ref: '#/components/schemas/TicketPriority'
        type:
          $ref: '#/components/schemas/TicketType'
        client_id:
          type: integer
        equipment_id:
          type: integer
          nullable: true
        assigned_to:
          type: integer
          nullable: true
          description: ID назначенного инженера
        created_by:
          type: integer
          description: ID создавшего пользователя
        work_template_id:
          type: integer
          nullable: true
        sla_deadline:
          type: string
          format: date-time
          nullable: true
        closed_at:
          type: string
          format: date-time
          nullable: true
        is_deleted:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, number, title, status, priority, type, client_id, created_by, is_deleted, created_at, updated_at]

    TicketCreate:
      type: object
      properties:
        title:
          type: string
          maxLength: 300
        description:
          type: string
          nullable: true
        priority:
          $ref: '#/components/schemas/TicketPriority'
        ticket_type:
          $ref: '#/components/schemas/TicketType'
        client_id:
          type: integer
        equipment_id:
          type: integer
          nullable: true
        work_template_id:
          type: integer
          nullable: true
          description: "Применить шаблон работ при создании заявки (UC-911)"
      required: [title, priority, ticket_type, client_id]

    TicketAssign:
      type: object
      properties:
        engineer_id:
          type: integer
      required: [engineer_id]

    TicketStatusUpdate:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/TicketStatus'
        comment:
          type: string
          nullable: true
      required: [status]

    CommentResponse:
      type: object
      properties:
        id:
          type: integer
        ticket_id:
          type: integer
        author_id:
          type: integer
        author_name:
          type: string
        text:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, ticket_id, author_id, author_name, text, created_at]

    CommentCreate:
      type: object
      properties:
        text:
          type: string
          minLength: 1
      required: [text]

    WorkActResponse:
      type: object
      properties:
        id:
          type: integer
        ticket_id:
          type: integer
        act_number:
          type: string
        status:
          type: string
          enum: [draft, signed]
        work_description:
          type: string
        signed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, ticket_id, act_number, status, work_description, created_at]

    # ─── Work Template ────────────────────────────────────────────────────────
    WorkTemplateResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        equipment_model_id:
          type: integer
        equipment_model_name:
          type: string
        work_items:
          type: array
          items:
            type: object
            properties:
              order:
                type: integer
              description:
                type: string
            required: [order, description]
        parts:
          type: array
          items:
            type: object
            properties:
              part_id:
                type: integer
              part_name:
                type: string
              quantity:
                type: integer
            required: [part_id, part_name, quantity]
        created_at:
          type: string
          format: date-time
      required: [id, name, equipment_model_id, equipment_model_name, work_items, parts, created_at]

    WorkTemplateCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        equipment_model_id:
          type: integer
        work_items:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              order:
                type: integer
              description:
                type: string
            required: [order, description]
        parts:
          type: array
          items:
            type: object
            properties:
              part_id:
                type: integer
              quantity:
                type: integer
                minimum: 1
            required: [part_id, quantity]
      required: [name, equipment_model_id, work_items]

    # ─── Spare Part ───────────────────────────────────────────────────────────
    SparePartResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
          nullable: true
        stock_quantity:
          type: integer
        unit:
          type: string
        min_stock:
          type: integer
        price:
          type: number
          format: float
          nullable: true
      required: [id, name, stock_quantity, unit, min_stock]

    # ─── File ─────────────────────────────────────────────────────────────────
    FileUploadResponse:
      type: object
      properties:
        id:
          type: integer
        file_name:
          type: string
        mime_type:
          type: string
        file_size:
          type: integer
          description: Размер в байтах
        uploaded_at:
          type: string
          format: date-time
      required: [id, file_name, mime_type, file_size, uploaded_at]

    # ─── Notification ─────────────────────────────────────────────────────────
    NotificationResponse:
      type: object
      properties:
        id:
          type: integer
        event_type:
          type: string
        message:
          type: string
        entity_type:
          type: string
          nullable: true
        entity_id:
          type: integer
          nullable: true
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
      required: [id, event_type, message, is_read, created_at]

    UnreadCountResponse:
      type: object
      properties:
        count:
          type: integer
      required: [count]

    NotificationSettingResponse:
      type: object
      properties:
        event_type:
          type: string
        channel:
          type: string
          enum: [email, telegram, in_app]
        enabled:
          type: boolean
      required: [event_type, channel, enabled]

    NotificationSettingUpdate:
      type: object
      properties:
        event_type:
          type: string
        channel:
          type: string
          enum: [email, telegram]
          description: "in_app нельзя отключить (BR-F-1400)"
        enabled:
          type: boolean
      required: [event_type, channel, enabled]

  responses:
    Unauthorized:
      description: Токен отсутствует или истёк
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: INVALID_TOKEN
            message: "Токен недействителен"
            details: {}

    Forbidden:
      description: Недостаточно прав
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: FORBIDDEN
            message: "Требуется роль: admin, svc_mgr"
            details: {}

    NotFound:
      description: Запись не найдена
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Конфликт уникальности
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    BusinessError:
      description: Нарушение бизнес-правила
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

security:
  - BearerAuth: []

paths:
  # ═══════════════════════════════════════════════════════════════
  # AUTH
  # ═══════════════════════════════════════════════════════════════
  /auth/login:
    post:
      tags: [Auth]
      summary: Вход в систему
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: admin@company.ru
              password: secret123
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Неверные учётные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INVALID_CREDENTIALS
                message: "Неверный email или пароль"
                details: {}

  /auth/me:
    get:
      tags: [Auth]
      summary: Текущий пользователь
      responses:
        '200':
          description: Данные текущего пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ═══════════════════════════════════════════════════════════════
  # USERS (Module 8)
  # ═══════════════════════════════════════════════════════════════
  /users:
    get:
      tags: [Пользователи]
      summary: Список пользователей
      description: Доступно admin, svc_mgr, director.
      parameters:
        - in: query
          name: role
          schema:
            $ref: '#/components/schemas/UserRole'
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            minimum: 1
        - in: query
          name: size
          schema:
            type: integer
            default: 20
            maximum: 200
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedMeta'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Пользователи]
      summary: Создать пользователя
      description: Только admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer

    get:
      tags: [Пользователи]
      summary: Получить пользователя по ID
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: OK
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Пользователи]
      summary: Обновить пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: OK
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Пользователи]
      summary: Удалить пользователя (soft delete)
      description: Только admin. Нельзя удалить себя.
      responses:
        '204':
          description: Удалён
        '400':
          $ref: '#/components/responses/BusinessError'
        '404':
          $ref: '#/components/responses/NotFound'

  # ═══════════════════════════════════════════════════════════════
  # CLIENTS
  # ═══════════════════════════════════════════════════════════════
  /clients:
    get:
      tags: [Клиенты]
      summary: Список клиентов
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Поиск по названию или ИНН
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            minimum: 1
        - in: query
          name: size
          schema:
            type: integer
            default: 20
            maximum: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedMeta'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ClientResponse'

    post:
      tags: [Клиенты]
      summary: Создать клиента
      description: admin, sales_mgr, svc_mgr.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreate'
      responses:
        '201':
          description: Клиент создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /clients/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer

    get:
      tags: [Клиенты]
      summary: Получить клиента
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Клиенты]
      summary: Обновить клиента
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'

    delete:
      tags: [Клиенты]
      summary: Удалить клиента (soft delete)
      description: Только admin.
      responses:
        '204':
          description: Удалён

  /clients/{id}/contacts:
    parameters:
      - in: path
