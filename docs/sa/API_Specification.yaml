  # SPARE PARTS
  # ═══════════════════════════════════════════════════════════════
  /parts:
    get:
      tags: [Запчасти]
      summary: Список запчастей
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: low_stock
          schema:
            type: boolean
          description: Только позиции с остатком ниже минимума
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            minimum: 1
        - in: query
          name: size
          schema:
            type: integer
            default: 20
            maximum: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedMeta'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/SparePartResponse'

    post:
      tags: [Запчасти]
      summary: Добавить запчасть в номенклатуру
      description: admin, warehouse.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SparePartResponse'
      responses:
        '201':
          description: Создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SparePartResponse'

  /parts/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer

    get:
      tags: [Запчасти]
      summary: Получить запчасть
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SparePartResponse'

    put:
      tags: [Запчасти]
      summary: Обновить запчасть
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SparePartResponse'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SparePartResponse'

  /parts/{id}/adjust-stock:
