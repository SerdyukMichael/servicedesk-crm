  # ═══════════════════════════════════════════════════════════════
  # AUDIT
  # ═══════════════════════════════════════════════════════════════
  /audit:
    get:
      tags: [Аудит]
      summary: Журнал изменений
      description: Только admin и director.
      parameters:
        - in: query
          name: entity_type
          schema:
            type: string
          description: "Например: ticket, equipment, user"
        - in: query
          name: entity_id
          schema:
            type: integer
        - in: query
          name: user_id
          schema:
            type: integer
        - in: query
          name: skip
          schema:
            type: integer
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedMeta'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            user_id:
                              type: integer
                              nullable: true
                            user_name:
                              type: string
                              nullable: true
                            action:
                              type: string
                            entity_type:
                              type: string
                            entity_id:
                              type: integer
                              nullable: true
                            details:
                              type: object
                            created_at:
                              type: string
                              format: date-time
        '403':
          $ref: '#/components/responses/Forbidden'
