  # ═══════════════════════════════════════════════════════════════
  # TICKETS (Module 9)
  # ═══════════════════════════════════════════════════════════════
  /tickets:
    get:
      tags: [Заявки]
      summary: Список заявок
      description: |
        Инженер видит только свои заявки.
        Руководитель и admin видят все.
        Фильтры сохраняются в сессии на фронте (UC-909).
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TicketStatus'
        - in: query
          name: priority
          schema:
            $ref: '#/components/schemas/TicketPriority'
        - in: query
          name: engineer_id
          schema:
            type: integer
        - in: query
          name: client_id
          schema:
            type: integer
        - in: query
          name: date_from
          schema:
            type: string
            format: date
        - in: query
          name: date_to
          schema:
            type: string
            format: date
        - in: query
          name: sla_violated
          schema:
            type: boolean
        - in: query
          name: page
          schema:
            type: integer
            default: 1
            minimum: 1
        - in: query
          name: size
          schema:
            type: integer
            default: 20
            maximum: 200
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedMeta'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/TicketResponse'

    post:
      tags: [Заявки]
      summary: Создать заявку
      description: admin, svc_mgr, engineer.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketCreate'
      responses:
        '201':
          description: Заявка создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'

  /tickets/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer

    get:
      tags: [Заявки]
      summary: Карточка заявки
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Заявки]
      summary: Обновить заявку (поля, не статус)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketCreate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'

    delete:
      tags: [Заявки]
      summary: Удалить (soft delete). Только admin.
      responses:
        '204':
          description: Удалена

  /tickets/{id}/assign:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer

    patch:
      tags: [Заявки]
      summary: Назначить инженера на заявку
      description: admin, svc_mgr.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketAssign'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /tickets/{id}/status:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer

    patch:
      tags: [Заявки]
      summary: Изменить статус заявки
      description: |
        Матрица переходов:
        - new → in_progress (при назначении инженера)
        - in_progress → pending_parts
        - in_progress → resolved
        - pending_parts → in_progress
        - resolved → closed (требует signed work_act)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketStatusUpdate'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/BusinessError'

  /tickets/{id}/comments:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer

    get:
      tags: [Заявки]
      summary: Список комментариев к заявке
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommentResponse'

    post:
      tags: [Заявки]
      summary: Добавить комментарий
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentCreate'
      responses:
        '201':
          description: Комментарий добавлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'

  /tickets/{id}/attachments:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer

    get:
      tags: [Заявки]
      summary: Список вложений к заявке
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileUploadResponse'

    post:
      tags: [Заявки]
      summary: Загрузить вложение (все типы, ≤20МБ)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        '201':
          description: Вложение загружено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'

  /tickets/{id}/work-act:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer

    get:
      tags: [Заявки]
      summary: Получить акт выполненных работ
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkActResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Заявки]
      summary: Создать акт выполненных работ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                work_description:
                  type: string
              required: [work_description]
      responses:
        '201':
          description: Акт создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkActResponse'

  /tickets/{id}/work-act/sign:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer

    post:
      tags: [Заявки]
      summary: Подписать акт (статус → signed)
      description: engineer, svc_mgr, admin.
      responses:
        '200':
          description: Акт подписан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkActResponse'
        '404':
          $ref: '#/components/responses/NotFound'

